name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version match
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $match = Select-String -Path Run-Audit.ps1 -Pattern '^\$ScriptVersion\s*=\s*"(.+)"'
          if (-not $match) {
            throw "Could not find `$ScriptVersion in Run-Audit.ps1"
          }
          $scriptVersion = $match.Matches.Groups[1].Value
          $tagVersion = $tag -replace '^v', ''
          if ($scriptVersion -ne $tagVersion) {
            throw "Tag version ($tagVersion) does not match `$ScriptVersion ($scriptVersion) in Run-Audit.ps1"
          }
          Write-Host "Version validated: $scriptVersion"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build GUI (restore + publish)
        shell: pwsh
        run: |
          dotnet publish src/WindowsAuditTool/WindowsAuditTool.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o gui-publish

      - name: Verify GUI output
        shell: pwsh
        run: |
          $exe = Get-Item "gui-publish/WindowsAuditTool.exe"
          if (-not $exe) { throw "WindowsAuditTool.exe not found in publish output" }
          Write-Host "GUI executable size: $([math]::Round($exe.Length / 1MB, 1)) MB"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create "${{ github.ref_name }}" `
            Run-Audit.ps1 `
            gui-publish/WindowsAuditTool.exe `
            --title "${{ github.ref_name }}" `
            --generate-notes
