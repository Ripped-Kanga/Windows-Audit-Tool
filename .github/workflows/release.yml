name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version match
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $match = Select-String -Path Run-Audit.ps1 -Pattern '^\$ScriptVersion\s*=\s*"(.+)"'
          if (-not $match) {
            throw "Could not find `$ScriptVersion in Run-Audit.ps1"
          }
          $scriptVersion = $match.Matches.Groups[1].Value
          $tagVersion = $tag -replace '^v', ''
          if ($scriptVersion -ne $tagVersion) {
            throw "Tag version ($tagVersion) does not match `$ScriptVersion ($scriptVersion) in Run-Audit.ps1"
          }
          Write-Host "Version validated: $scriptVersion"

      - name: Install PS2EXE
        shell: pwsh
        run: Install-Module ps2exe -Scope CurrentUser -Force

      - name: Compile executable
        shell: pwsh
        run: Invoke-ps2exe .\Run-Audit.ps1 .\Run-Audit.exe

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create "${{ github.ref_name }}" Run-Audit.ps1 Run-Audit.exe --title "${{ github.ref_name }}" --generate-notes
